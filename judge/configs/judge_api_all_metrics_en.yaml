input:
  paths:
    # - /work/projects/polyullm/shihao/agent/data/10_canonical/
    - /Users/wenrizhou/Documents/GitHub/Agent-Data-Quality/data/minhash+semantic/train.jsonl
  max_samples: 10
  # max_samples: null

client:
  # OpenAI-compatible chat-completions API backend.
  # Environment variables take priority over these config fields:
  #   MODEL, BASE_URL, API_KEY
  # BASE_URL may be either a root URL ending in /v1 or a full
  # /v1/chat/completions endpoint.
  backend: openai_chat
  model: null
  base_url: null
  api_key: null
  use_chat_messages: true
  batch_size: 16
  max_concurrency: 8
  temperature: 0.0
  max_tokens: 2048
  timeout: 120.0
  max_retries: 2
  retry_delay: 1.0

metrics:
  - name: specificity_en
    prompt: prompt_en.j2
  - name: parameter_alignment_en
    prompt: prompt_v2_en.j2
  - name: tool_selection_en
    prompt: prompt_v2_en.j2
  - name: user_requirement_fulfillment_en
    prompt: prompt_v8_en.j2
  - name: final_response_evidence_support_en
    prompt: prompt_v2_en.j2
  - name: minimality_en
    prompt: prompt_v1_en.j2

output:
  dir: auto
  base_dir: outputs
  run_name: all_metrics_api_en
  resume: true
