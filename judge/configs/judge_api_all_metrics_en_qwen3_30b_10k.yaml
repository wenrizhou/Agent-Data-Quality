input:
  paths:
    - /work/projects/polyullm/xinhang/data_quality/data/minhash+semantic/
  max_samples: 10000

client:
  # OpenAI-compatible chat-completions API backend.
  # The integrated Slurm script sets MODEL, BASE_URL, and API_KEY from the
  # launched SGLang server, and these environment variables take priority.
  backend: openai_chat
  model: null
  base_url: null
  api_key: null
  use_chat_messages: true
  batch_size: 64
  max_concurrency: 32
  temperature: 0.0
  max_tokens: 1024
  timeout: 120.0
  max_retries: 2
  retry_delay: 1.0

metrics:
  - name: specificity_en
    prompt: prompt_en.j2
  - name: parameter_alignment_en
    prompt: prompt_v2_en.j2
  - name: tool_selection_en
    prompt: prompt_v2_en.j2
  - name: user_requirement_fulfillment_en
    prompt: prompt_v8_en.j2
  - name: final_response_evidence_support_en
    prompt: prompt_v2_en.j2
  - name: minimality_en
    prompt: prompt_v1_en.j2

output:
  # Keep this directory fixed so later wider runs can resume and skip completed
  # rows. For example, after this 10k run, --max-samples 20000 only adds the
  # next 10k samples because the first 10k task keys already exist here.
  dir: outputs/all_metrics_api_en/qwen3-30b-a3b-instruct-2507/chunks
  base_dir: outputs
  run_name: all_metrics_api_en
  resume: true
