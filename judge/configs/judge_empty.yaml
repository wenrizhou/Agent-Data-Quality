input:
  paths:
    - agent/data/10_canonical/ToolACE/data_*.jsonl.gz
  max_samples: 10

client:
  backend: sglang
  host: 127.0.0.1
  port: 31877
  endpoint: /generate
  base_url: null
  api_key: null
  model_path: null
  tokenize_chat: false
  tokenizer_workers: 8
  batch_size: 64
  max_concurrency: 32
  temperature: 0.0
  max_tokens: 512
  timeout: 120.0
  max_retries: 2
  retry_delay: 1.0

metrics: []

output:
  dir: auto
  base_dir: outputs
  run_name: empty_smoke
  resume: true
