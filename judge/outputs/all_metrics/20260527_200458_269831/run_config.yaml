input:
  paths:
    - agent/data/10_canonical/ToolACE/data_*.jsonl.gz
  max_samples: 10

client:
  backend: sglang
  host: 127.0.0.1
  port: 31877
  endpoint: /generate
  base_url: null
  api_key: null
  model_path: /work/projects/polyullm/models/Qwen3/Qwen3-32B/
  # model_path: /work/projects/polyullm/yuhang/post-train/models/Qwen/Qwen3-4B/
  tokenize_chat: true
  use_chat_messages: true
  chat_template_kwargs:
    enable_thinking: false
  tokenizer_workers: 8
  batch_size: 16
  max_concurrency: 8
  temperature: 0.0
  max_tokens: 2048
  timeout: 120.0
  max_retries: 2
  retry_delay: 1.0

metrics:
  - name: specificity
  - name: coherence
  - name: solvability
  - name: parameter_alignment
  - name: sufficiency
  - name: minimality

output:
  dir: auto
  base_dir: outputs
  run_name: all_metrics
  resume: true
